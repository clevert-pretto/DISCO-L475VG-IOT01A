repos:
  - repo: local
    hooks:
      # --- Legacy C Project (03_FreeRTOS) ---
      - id: cppcheck-legacy
        name: cppcheck (03_FreeRTOS)
        entry: cppcheck
        language: system
        types: [c]
        files: ^03_FreeRTOS/App/
        args:
          [
            "--enable=all",
            "--addon=build_utils/misra_rules.json",
            "--inline-suppr",
            "--suppressions-list=build_utils/cppcheck_suppressions.txt",
            "--error-exitcode=1",
            "--std=c11",
            "-I", "03_FreeRTOS/App/Inc",
            "-I", "03_FreeRTOS/Middlewares/FreeRTOS",
            "-I", "03_FreeRTOS/Middlewares/FreeRTOS/include",
            "-I", "03_FreeRTOS/Middlewares/FreeRTOS/portable",
            "-I", "03_FreeRTOS/Drivers/STM32L4xx_HAL_Driver",
            "-I", "03_FreeRTOS/Drivers/STM32L4xx_HAL_Driver/Inc",
            "-D", "STM32L475xx", # Tells the linter which chip you are using
            "--quiet"
          ]

      # --- Cppcheck Hook for Modern C++ Project (04_FreeRTOS_Cpp) ---
      - id: cppcheck-modern
        name: cppcheck (C++ Project)
        entry: cppcheck
        language: system
        types: [c++] # Catches .cpp, .hpp
        files: ^04_FreeRTOS_Cpp/App/
        args:
          [
            "--enable=all",
            "--inline-suppr",
            "--std=c++17",
            "--suppressions-list=build_utils/cppcheck_suppressions.txt",
            "--error-exitcode=1",
            "-I", "04_FreeRTOS_Cpp/App/Inc",
            "-D", "STM32L475xx",
            "--quiet"
          ]

      # --- Complexity Check (Both Projects) ---
      - id: lizard-check
        name: lizard
        entry: ./.venv/bin/lizard
        language: system
        types_or: [c, c++]
        files: ^(03_FreeRTOS|04_FreeRTOS_Cpp)/App/
        args: ["-w", "-l", "15", "-C", "10"]