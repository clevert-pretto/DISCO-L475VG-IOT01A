name: Test and Deploy Docs

on:
  push:
    branches: [ main ]  # Or 'master' depending on your default branch
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ==========================================
  # JOB 1: Parallel Quality Gates
  # ==========================================
  quality-gate:
    runs-on: ubuntu-latest

    # 1. Define the matrix
    strategy:
      matrix:
        project_path: ["03_FreeRTOS", "04_FreeRTOS_Cpp"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ... tool installation steps ..
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck lcov cmake build-essential
          pipx install lizard

      - name: Install Python Tools
        run: |
          python -m pip install --upgrade pip
          pip install lizard plotly junit2html pre-commit pytest pyserial
          # MAGIC TRICK: Create a fake .venv/bin folder so the 
          # pre-commit config finds the lizard executable
          mkdir -p .venv/bin
          ln -s $(which lizard) ./.venv/bin/lizard
          ln -s $(which pytest) ./.venv/bin/pytest
          
      # --- 1. MISRA & Complexity Runs for ALL projects in the matrix ---
      - name: Run Pre-Commit Quality Gates
        run: pre-commit run --all-files --config build_utils/.pre-commit-config.yaml

      # --- 2. Runs ONLY for new C++ projects ---
      - name: Build and Run Unit Tests
        if: matrix.project_path != '03_FreeRTOS'
        working-directory: ${{ matrix.project_path }}
        run: |
          mkdir -p build_host
          cd build_host
          cmake ..
          make -j$(nproc)
          ./tests/unit_tests --gtest_output="xml:Reports/unit_test_results.xml"
      
      # 3. Code Coverage (Skips 03_FreeRTOS)
      - name: Generate Coverage Report
        if: matrix.project_path != '03_FreeRTOS'
        working-directory: ${{ matrix.project_path }}
        run: |
          lcov --capture --directory build_host --output-file build_host/Reports/coverage.info --ignore-errors mismatch,unused,empty
          lcov --remove build_host/Reports/coverage.info '/usr/*' '*_deps/*' '*tests/*' --output-file build_host/Reports/filtered_coverage.info --ignore-errors unused,empty
          genhtml build_host/Reports/filtered_coverage.info --output-directory build_host/Reports/coverage --ignore-errors mismatch

      # 4. Generate Dashboard HTML (Skips 03_FreeRTOS)
      - name: Generate Unified Dashboard
        if: matrix.project_path != '03_FreeRTOS'
        run: python3 generate_dashboard.py ${{ matrix.project_path }}

      # 5. Upload HTML files to GitHub (Skips 03_FreeRTOS)
      - name: Upload Quality Reports
        if: matrix.project_path != '03_FreeRTOS'
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-${{ matrix.project_path }}
          path: ${{ matrix.project_path }}/build_host/Reports/

  # ==========================================
  # JOB 2: Build Documentation (Runs ONCE)
  # ==========================================
  build-docs:
    needs: quality-gate # Waits for BOTH C and C++ gates to pass!
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- Download the artifacts from Job 1 ---
      - name: Download Quality Reports
        uses: actions/download-artifact@v4
        with:
          pattern: quality-reports-*
          path: docs/reports
          merge-multiple: false # Keeps projects in separate subfolders

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll Site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
  # ==========================================
  # JOB 3: Deploy to GitHub Pages
  # ==========================================
  deploy:
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      runs-on: ubuntu-latest
      needs: build-docs
      steps:
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4
  # ==========================================
  # JOB 4: HIL Testing (Runs on local hardware)
  # ==========================================
  hil-testing:
    needs: quality-gate # Waits for BOTH C and C++ gates to pass!
    runs-on: self-hosted # Assumes you have a self-hosted runner set up on your local machine connected to the hardware
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Python Tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run HIL Tests
        run: |
          # The conftest.py skip logic handles cases where the hardware isn't connected, 
          # so this won't fail the workflow if run on a machine without the hardware
          source .venv/bin/activate
          pytest 04_FreeRTOS_Cpp/HIL_test/test_system.py --html=04_FreeRTOS_Cpp/HIL_test/hil_test_report.html --self-contained-html

      - name: Upload HIL Test Report
        uses: actions/upload-artifact@v4
        with:
          name: hil-test-report
          path: 04_FreeRTOS_Cpp/HIL_test/hil_test_report.html

